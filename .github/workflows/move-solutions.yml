name: Move LeetHub Submissions

on:
  push:
    branches:
      - main

jobs:
  move-files:
    runs-on: ubuntu-latest
    # This explicitly gives the script permission to write changes back to your repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Move problem folders
        run: |
          mkdir -p "leetcode solutions"
          find . -maxdepth 1 -type d -name '[0-9][0-9][0-9][0-9]-*' -exec mv {} "leetcode solutions/" \;

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "leetcode solutions/"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated: Moved LeetCode solutions to subfolder" && git push)
