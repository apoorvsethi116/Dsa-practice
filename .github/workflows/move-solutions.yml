name: Move LeetHub Submissions

on:
  push:
    branches:
      - main  # Adjust if your default branch is different

jobs:
  move-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move problem folders
        run: |
          mkdir -p "leetcode solutions"

          # Find directories in the root that start with exactly 4 digits
          find . -maxdepth 1 -type d -name '[0-9][0-9][0-9][0-9]-*' -exec mv {} "leetcode solutions/" \;

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage all changes (moves and new directory)
          git add .

          # Check if there are staged changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Automated: Moved LeetCode solutions to subfolder"
            # Pull with rebase to sync with remote changes, then push
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected. Skipping commit and push."
          fi
