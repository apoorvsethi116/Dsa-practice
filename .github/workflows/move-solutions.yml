name: Move LeetHub Submissions

on:
  push:
    branches:
      - main  # Adjust if your default branch is different

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Move problem folders
        run: |
          # Create the target directory if it doesn't exist
          mkdir -p "leetcode solutions"
          
          # Find all problem folders matching the LeetCode 4-digit pattern (e.g., 0002-, 0020-)
          # and move them into the target directory
          find . -maxdepth 1 -type d -name '[0-9][0-9][0-9][0-9]-*' -exec mv {} "leetcode solutions/" \;

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "leetcode solutions/"
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated: Moved LeetCode solutions to subfolder")
          git pull --rebase origin main
          git push
